<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Projeto Terra</title>
    <style>
      /* Paleta de Cores e Reset */
      :root {
        --marrom-escuro: #3e2723;
        --marrom-claro: #8c391a;
        --cinza-claro: #d3d3d3;
        --branco: #ffffff;
        --sucesso: #4caf50; /* Verde para feedback de sucesso */
      }

      body,
      html {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #973f2d 0%, #532a1b 100%);
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card-cadastro {
        background-color: var(--marrom-escuro);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        color: var(--branco);
        text-align: center;
      }

      h2 {
        margin-bottom: 25px;
        color: var(--cinza-claro);
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid transparent;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
      }

      input::placeholder {
        color: var(--cinza-claro);
        opacity: 1;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: var(--marrom-claro);
        color: var(--cinza-claro);
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #bcaaa4;
      }

      /* Estilo da mensagem de sucesso */
      #mensagem-sucesso {
        display: none; /* Escondido por padrão */
        padding: 20px;
      }

      #mensagem-sucesso h3 {
        color: var(--branco);
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card-cadastro">
      <!-- Container do Formulário -->
      <div id="container-form">
        <h2>Cadastro Terra</h2>
        <form id="form-cadastro">
          <div class="form-group">
            <input
              type="text"
              name="nome_completo"
              placeholder="Nome Completo"
              required
            />
          </div>

          <div class="form-group">
            <input type="date" name="data_nascimento" required />
          </div>

          <div class="form-group">
            <input
              type="tel"
              name="telefone"
              placeholder="Número de Telefone"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              required
            />
          </div>

          <button type="submit">CADASTRAR</button>
        </form>
      </div>

      <!-- Container de Sucesso -->
      <div id="mensagem-sucesso">
        <div style="font-size: 50px; margin-bottom: 15px">✅</div>
        <h3>Enviado com sucesso!</h3>
        <p style="color: var(--cinza-claro)">
          Seu cadastro foi realizado no Projeto Terra.
        </p>
      </div>
    </div>

    <script>
      // Seleciona os elementos
      const form = document.getElementById("form-cadastro");
      const containerForm = document.getElementById("container-form");
      const mensagemSucesso = document.getElementById("mensagem-sucesso");

      // Intercepta o envio
      form.addEventListener("submit", function (e) {
        e.preventDefault(); // Impede o envio real para não recarregar a página

        // Esconde o formulário com uma transição simples e mostra o sucesso
        containerForm.style.display = "none";
        mensagemSucesso.style.display = "block";
      });
    </script>
  </body>
</html>
