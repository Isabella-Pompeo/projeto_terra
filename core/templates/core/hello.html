<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro - Projeto Terra</title>
    <style>
      ::placeholder {
        color: #d3d3d3; /* Cinza claro */
        opacity: 1;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
      }
    </style>
  </head>
  <body>
    <h2>Formulário de Cadastro</h2>
    <form method="post">
      <!-- Nome Completo -->
      <div class="form-group">
        <input
          type="text"
          name="nome_completo"
          placeholder="Nome Completo"
          required
        />
      </div>

      <!-- Data de Nascimento (Usa o seletor nativo que integra com Google Agenda no Android/Chrome) -->
      <div class="form-group">
        <input
          type="date"
          name="data_nascimento"
          placeholder="Data de Nascimento"
          required
        />
      </div>

      <!-- Número de Telefone (Apenas números) -->
      <div class="form-group">
        <input
          type="tel"
          name="telefone"
          placeholder="Número de Telefone"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
          required
        />
      </div>

      <button type="submit">Cadastrar</button>
    </form>
  </body>
</html>
